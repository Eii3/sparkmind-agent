spring:
  application:
    name: sparkmind-agent
  config:
    import: optional:application-secret.yml
server:
  port: 8123
  servlet:
    context-path: /api
data:
  redis:
    port: 6379
    host: localhost
    database: 0

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.zeng.sparkmindagent.controller

knife4j:
  enable: true
  setting:
    language: zh_cn

